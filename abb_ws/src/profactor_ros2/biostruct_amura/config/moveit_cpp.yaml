planning_scene_monitor_options:
  name: "planning_scene_monitor"
  robot_description: "robot_description"
  joint_state_topic: "/joint_states"
  attached_collision_object_topic: "/1moveit_cpp/planning_scene_monitor"
  publish_planning_scene_topic: "/1moveit_cpp/publish_planning_scene"
  monitored_planning_scene_topic: "/1moveit_cpp/monitored_planning_scene"
  wait_for_initial_state_timeout: 10.0

planning_pipelines:
  # must equal the namespaces below
  pipeline_names: ["pilz_industrial_motion_planner", "ompl", "chomp"]

# Per-request presets
ompl_rttc:
  plan_request_params:
    planning_attempts: 3
    planning_pipeline: ompl                  # must match one of pipeline_names
    planner_id: "RRTConnectkConfigDefault"
    max_velocity_scaling_factor: 1.0
    max_acceleration_scaling_factor: 1.0
    planning_time: 15.0
    debug_mode: true

pilz_ptp:
  plan_request_params:
    planning_attempts: 1
    planning_pipeline: pilz_industrial_motion_planner
    planner_id: "PTP"
    max_velocity_scaling_factor: 1.0
    max_acceleration_scaling_factor: 1.0
    planning_time: 0.8
    debug_mode: true

pilz_lin:
  plan_request_params:
    planning_attempts: 1
    planning_pipeline: pilz_industrial_motion_planner
    planner_id: "LIN"
    max_velocity_scaling_factor: 1.0
    max_acceleration_scaling_factor: 1.0
    planning_time: 0.8
    debug_mode: true

chomp_planner:
  plan_request_params:
    planning_attempts: 1
    planning_pipeline: chomp
    max_velocity_scaling_factor: 1.0
    max_acceleration_scaling_factor: 1.0
    planning_time: 1.5
    debug_mode: true
